services:
  - type: static
      name: lbap-industrial
          buildCommand: npm install && npx vite build
              publishPath: dist
                  routes:
                        - type: rewrite
                                source: /*
                                        destination: /index.html
                                            envVars:
                                                  - key: NODE_VERSION
                                                          value: 18.17.0
                                                          
